# Supabase local config. Generated to match the system-design contract.
# Run with `supabase start`. Ports below are Supabase CLI defaults.

project_id = "purple-signals"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/accept-invite"]
jwt_expiry = 3600
# Self-serve signups are disabled — accounts are provisioned via the admin invite API.
# (Locally this also blocks the /signup form. Login for existing users is unaffected.)
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
